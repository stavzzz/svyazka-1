services:
  secretary-bot:
    build: .
    container_name: secretary-bot
    restart: unless-stopped
    # host-сеть: бот достаёт до OpenClaw gateway на 127.0.0.1 (вариант 1).
    # Для варианта MiniMax это тоже безвредно — бот ничего не слушает.
    network_mode: host
    env_file: .env
    environment:
      GOOGLE_CREDS_FILE: /creds/google.json
      STATE_FILE: /data/state.json
    volumes:
      - ./data:/data
      # Реюз кредов Google Workspace MCP (read-only)
      - /root/.google_workspace_mcp/credentials/YOUR_EMAIL@gmail.com.json:/creds/google.json:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
